# Final C/C++ Configuration for Helix
# Add this to ~/.config/helix/languages.toml

# Language Server Configuration
[language-server.hx-lsp]
command = "hx-lsp"

[language-server.clangd]
command = "clangd"
args = ["--background-index", "--clang-tidy", "--completion-style=detailed"]

# C Language Configuration
[[language]]
name = "c"
scope = "source.c"
injection-regex = "c"
file-types = ["c", "h"]
roots = ["compile_commands.json", ".git", "Makefile"]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
language-servers = ["clangd", "hx-lsp"]
indent = { tab-width = 8, unit = "        " }
auto-format = true
formatter = { command = "clang-format", args = ["--style={BasedOnStyle: llvm, IndentWidth: 8, TabWidth: 8, UseTab: Never}"] }

# C++ Language Configuration
[[language]]
name = "cpp"
scope = "source.cpp"
injection-regex = "cpp"
file-types = ["cc", "hh", "cpp", "hpp", "cxx", "hxx", "C", "H", "CPP"]
roots = ["compile_commands.json", ".git", "Makefile", "CMakeLists.txt"]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
language-servers = ["clangd", "hx-lsp"]
indent = { tab-width = 8, unit = "        " }
auto-format = true
formatter = { command = "clang-format", args = ["--style={BasedOnStyle: llvm, IndentWidth: 8, TabWidth: 8, UseTab: Never}"] }

